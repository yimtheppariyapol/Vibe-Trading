services:
  vibe-trading:
    build: .
    ports:
      - "127.0.0.1:8899:8899"
    env_file:
      - agent/.env
    environment:
      - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
      - INVESTMENT_OS_CANDIDATES_PATH=/investment-os/portfolios/stock_core_candidates.yaml
      - INVESTMENT_OS_INVESTMENT_POLICY_PATH=/investment-os/docs/investment-policy.md
      - INVESTMENT_OS_RISK_POLICY_PATH=/investment-os/docs/risk-policy.md
      - INVESTMENT_OS_RESEARCH_DIR=/investment-os/research
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
      - ../investment-os/portfolios/stock_core_candidates.yaml:/investment-os/portfolios/stock_core_candidates.yaml:ro
      - ../investment-os/docs/investment-policy.md:/investment-os/docs/investment-policy.md:ro
      - ../investment-os/docs/risk-policy.md:/investment-os/docs/risk-policy.md:ro
      - ../investment-os/research:/investment-os/research
    restart: unless-stopped

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5899:5899"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://vibe-trading:8899
    command: sh -c "npm install && npm run dev -- --host --port 5899"
    profiles:
      - frontend
    depends_on:
      vibe-trading:
        condition: service_started

volumes:
  vibe-runs:
  vibe-sessions:
